services:
  database:
    image: postgres:alpine
    restart: always
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  backend:
    image: eclipse-temurin:17-alpine
    working_dir: /app
    ports:
      - 8080:8080
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    command: ./mvnw spring-boot:run
    depends_on:
      database:
        condition: service_healthy
  frontend:
    image: node:alpine
    working_dir: /app
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
    command: npm run dev
